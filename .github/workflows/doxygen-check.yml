name: static-analysis
on:
  pull_request:
  push:
    branches: [main]
jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Doxygenヘッダ検査
        run: python scripts/check_doxygen.py --scan .
      - name: VBA静的検査
        run: python scripts/lint_vba.py --scan .
      - name: 危険コマンド検査フックのセルフテスト
        run: python scripts/block_dangerous_bash.py --self-test
